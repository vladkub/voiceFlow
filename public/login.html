    <script>(function(){
      try {
        /* Electron file:// login: нет site-lang-*.js — иначе .login-card остаётся visibility:hidden */
        if (/^file:/i.test(location.protocol || '')) return;
        if (/VoiceTranslatorDesktop/i.test(navigator.userAgent || '')) return;
      } catch (e) { /* ignore */ }
      if (/^\/[a-z]{2}(?:\/|$)/.test(location.pathname||'/')) return;
      document.documentElement.classList.add('site-lang-loading');
    })();</script>

        var ua = typeof navigator !== 'undefined' && navigator.userAgent ? navigator.userAgent : '';

    <script>
    (function () {
      'use strict';

      var apiOrigin = '';

      function siteT(key) {
        if (typeof window.siteLangT === 'function') return window.siteLangT(key);
        return key;
      }

      function applyLoginPageI18n(isRegister) {
        var card = document.querySelector('.login-card');
        var titleEl = document.getElementById('loginCardTitle');
        var subEl = document.getElementById('loginCardSub');
        if (titleEl) {
          titleEl.setAttribute('data-site-i18n', isRegister ? 'login.page.title_register' : 'login.page.title_login');
        }
        if (subEl) {
          subEl.setAttribute('data-site-i18n', isRegister ? 'login.page.sub_register' : 'login.page.sub_login');
        }
        if (typeof window.applySiteLangTo === 'function' && card) {
          window.applySiteLangTo(card);
        }
        document.title = siteT(isRegister ? 'login.page.doc_title_register' : 'login.page.doc_title_login');
      }

      function localizedPath(path) {
        if (typeof window.vfLocalizedHref === 'function') return window.vfLocalizedHref(path);
        return path;
      }

      function isFileLoginPage() {
        try {
          return /^file:/i.test(window.location.protocol);
        } catch (e) {
          return false;
        }
      }

      function absUrl(path) {
        var p = path == null ? '' : String(path);
        if (!p) return p;
        if (/^https?:\/\//i.test(p)) return p;
        if (!p.startsWith('/')) p = '/' + p;
        if (apiOrigin) return apiOrigin + p;
        return p;
      }

      function apiFetch(path, init) {
        var opts = init ? Object.assign({}, init) : {};
        if (isLoginDesktopShell()) {
          var hdrs = Object.assign({}, opts.headers || {});
          hdrs['X-VoiceFlow-Client'] = 'desktop';
          opts.headers = hdrs;
        }
        return fetch(absUrl(path), opts);
      }

      function safeRedirect(raw) {
        if (!raw || typeof raw !== 'string') return '/dashboard';
        try {
          var s = decodeURIComponent(raw).trim();
          if (!s.startsWith('/') || s.startsWith('//')) return '/dashboard';
          return s.split('#')[0];
        } catch (e) {
          return '/dashboard';
        }
      }

      function registerPageHref(redirectRaw) {
        var q = new URLSearchParams();
        q.set('register', '1');
        var red = safeRedirect(redirectRaw || '');
        if (red && red !== '/dashboard') {
          q.set('redirect', red);
        }
        try {
          var path = safeRedirect(redirectRaw);
          var extra = path.indexOf('?') >= 0 ? path.slice(path.indexOf('?') + 1) : '';
          if (extra) {
            var sp = new URLSearchParams(extra);
            var pack = sp.get('pack');
            var qty = sp.get('qty');
            if (pack) q.set('pack', pack);
            if (qty) q.set('qty', qty);
          }
        } catch (e) {
          /* ignore */
        }
        return '/login?' + q.toString();
      }

      function setLoginMode(mode) {
        var isRegister = mode === 'register';
        var loginPanel = document.getElementById('loginPanel');
        var registerPanel = document.getElementById('registerPanel');
        var titleEl = document.getElementById('loginCardTitle');
        var subEl = document.getElementById('loginCardSub');
        var regPrompt = document.getElementById('loginRegPrompt');
        var signInPrompt = document.getElementById('loginSignInPrompt');
        if (loginPanel) loginPanel.hidden = isRegister;
        if (registerPanel) registerPanel.hidden = !isRegister;
        applyLoginPageI18n(isRegister);
        if (regPrompt) regPrompt.hidden = isRegister;
        if (signInPrompt) signInPrompt.hidden = !isRegister;
        if (isRegister) {
          var captchaEl = document.getElementById('registerCaptcha');
          if (captchaEl && window.vfCaptcha) {
            captchaEl.setAttribute('aria-hidden', 'false');
            window.vfCaptcha.render(captchaEl);
          }
        }
        try {
          var url = new URL(window.location.href);
          if (isRegister) {
            url.searchParams.set('register', '1');
          } else {
            url.searchParams.delete('register');
          }
          window.history.replaceState({}, '', url.pathname + url.search);
        } catch (histErr) {
          /* ignore */
        }
      }

      function isLoginDesktopShell() {
        try {
          var ua = navigator.userAgent || '';
          if (/VoiceTranslatorDesktop/i.test(ua)) return true;
          if (isFileLoginPage()) return true;
          return typeof window.voiceflowDesktop !== 'undefined' && window.voiceflowDesktop;
        } catch (e) {
          return false;
        }
      }

      function initLoginDesktopWindowControls() {
        if (!isLoginDesktopShell()) return;
        try {
          document.documentElement.classList.add('vf-desktop-login');
        } catch (e) { /* ignore */ }
        var vd = window.voiceflowDesktop;
        if (!vd || typeof vd.windowMinimize !== 'function') return;
        var minBtn = document.getElementById('loginDesktopWinMin');
        var maxBtn = document.getElementById('loginDesktopWinMax');
        var closeBtn = document.getElementById('loginDesktopWinClose');
        if (!minBtn || !maxBtn || !closeBtn) return;

        function syncMaxUi() {
          var m = maxBtn.classList.contains('is-maximized');
          maxBtn.title = m ? 'Восстановить' : 'Развернуть';
          maxBtn.setAttribute('aria-label', maxBtn.title);
        }

        async function pullMaxState() {
          try {
            if (typeof vd.windowIsMaximized !== 'function') return;
            var m = Boolean(await vd.windowIsMaximized());
            maxBtn.classList.toggle('is-maximized', m);
            syncMaxUi();
          } catch (_) { /* ignore */ }
        }

        void pullMaxState();

        var unsubMax = null;
        try {
          if (typeof vd.onWindowMaximizedChanged === 'function') {
            unsubMax = vd.onWindowMaximizedChanged(function (m) {
              maxBtn.classList.toggle('is-maximized', Boolean(m));
              syncMaxUi();
            });
          }
        } catch (_) { /* ignore */ }

        maxBtn.addEventListener('click', async function () {
          try {
            if (typeof vd.windowMaximizeToggle !== 'function') return;
            var m = Boolean(await vd.windowMaximizeToggle());
            maxBtn.classList.toggle('is-maximized', m);
            syncMaxUi();
          } catch (_) { /* ignore */ }
        });

        minBtn.addEventListener('click', function () {
          void vd.windowMinimize();
        });
        closeBtn.addEventListener('click', function () {
          void vd.windowClose();
        });

        window.addEventListener('beforeunload', function () {
          if (typeof unsubMax === 'function') unsubMax();
        });
      }

      async function init() {
        if (isFileLoginPage()) {
          document.documentElement.classList.add('vf-desktop-login');
          document.documentElement.classList.remove('site-lang-loading');
          document.querySelectorAll('link[href^="/"]').forEach(function (n) {
            n.remove();
          });
        }

        if (
          isFileLoginPage() &&
          typeof window.voiceflowDesktop !== 'undefined' &&
          window.voiceflowDesktop &&
          typeof window.voiceflowDesktop.getChatOrigin === 'function'
        ) {
          try {
            apiOrigin = String(await window.voiceflowDesktop.getChatOrigin() || '')
              .trim()
              .replace(/\/$/, '');
          } catch (e) {
            apiOrigin = '';
          }
        }

        var sp = new URLSearchParams(window.location.search);
        var redirectTarget = safeRedirect(sp.get('redirect') || '');
        var regHref = registerPageHref(sp.get('redirect') || redirectTarget);
        var loginRegLink = document.getElementById('loginRegLink');
        var loginSignInLink = document.getElementById('loginSignInLink');
        if (loginRegLink) loginRegLink.setAttribute('href', absUrl(regHref));

        var loginHomeLink = document.getElementById('loginHomeLink');
        if (loginHomeLink) loginHomeLink.setAttribute('href', localizedPath('/'));

        if (sp.get('register') === '1') {
          setLoginMode('register');
        } else {
          setLoginMode('login');
        }

        if (loginRegLink) {
          loginRegLink.addEventListener('click', function (e) {
            e.preventDefault();
            setLoginMode('register');
          });
        }
        if (loginSignInLink) {
          loginSignInLink.addEventListener('click', function (e) {
            e.preventDefault();
            setLoginMode('login');
          });
        }

        var form = document.getElementById('loginPageForm');
        var registerForm = document.getElementById('registerPageForm');
        var registerSubmitBtn = document.getElementById('registerPageSubmit');
        var msg = document.getElementById('loginPageMessage');
        var submitBtn = document.getElementById('loginPageSubmit');
        var googleBtn = document.getElementById('loginGoogleBtn');
        var oauthDivider = document.getElementById('loginOAuthDivider');

        var oauthErrors = {
          google_auth_failed: siteT('login.oauth.failed'),
          google_denied: siteT('login.oauth.denied'),
          google_no_code: 'Google не вернул код авторизации.',
          google_token_failed: 'Ошибка обмена кода Google.',
          google_profile_failed: 'Не удалось получить профиль Google.',
          google_not_configured: 'Вход через Google не настроен на сервере.',
        };
        var urlErr = sp.get('error');
        if (urlErr && oauthErrors[urlErr]) {
          msg.textContent = oauthErrors[urlErr];
          msg.className = 'is-error';
        }

        if (googleBtn) {
          googleBtn.addEventListener('click', async function () {
            googleBtn.disabled = true;
            if (msg.className !== 'is-error' || !urlErr) {
              msg.className = '';
              msg.textContent = '';
            }
            try {
              if (
                isLoginDesktopShell() &&
                typeof window.voiceflowDesktop !== 'undefined' &&
                window.voiceflowDesktop &&
                typeof window.voiceflowDesktop.startGoogleOAuth === 'function'
              ) {
                msg.textContent = 'Откроется окно Google внутри приложения…';
                msg.className = '';
                var oResult = await window.voiceflowDesktop.startGoogleOAuth(redirectTarget);
                if (oResult && oResult.ok) {
                  if (oResult.navigated) {
                    msg.textContent = 'Вход выполнен. Открываем приложение…';
                    msg.className = 'is-ok';
                    return;
                  }
                  window.location.href = absUrl(oResult.redirect || redirectTarget);
                  return;
                }
                var oErr = oResult && oResult.error ? String(oResult.error) : '';
                var deskMsg = '';
                if (oErr === 'oauth_timeout') {
                  deskMsg = 'Время ожидания входа истекло. Попробуйте снова.';
                } else if (oErr === 'google_denied' || oErr === 'no_token') {
                  deskMsg = oauthErrors.google_denied;
                } else if (oauthErrors[oErr]) {
                  deskMsg = oauthErrors[oErr];
                } else if (oErr.indexOf('google_start_503') === 0) {
                  deskMsg =
                    'Вход через Google не настроен на сервере. Добавьте ключи в .env и перезапустите backend.';
                } else if (/^google_start_/.test(oErr)) {
                  var gss = oErr.replace(/^google_start_/, '');
                  if (gss === '404') {
                    deskMsg =
                      'Сервер не знает /api/auth/google. Обновите Node (server.js) на VPS или задайте VOICE_TRANSLATOR_CHAT_URL=https://talkpilot.pro/ui в .env десктопа.';
                  } else {
                    deskMsg =
                      'Сервер вернул ошибку ' +
                      gss +
                      ' при запуске Google. Проверьте VOICE_TRANSLATOR_CHAT_URL (нужен тот же TalkPilot, что в Google Console).';
                  }
                } else if (oErr === 'oauth_in_progress') {
                  deskMsg = 'Вход уже выполняется. Дождитесь завершения в браузере.';
                } else if (oErr === 'session_verify_failed') {
                  deskMsg =
                    'Вход в Google прошёл, но сессия в приложении не сохранилась. Обновите server.js / web_server.py и перезапустите сайт и десктоп.';
                } else if (oErr === 'google_start_no_url') {
                  deskMsg = 'Сервер не вернул ссылку Google. Убедитесь, что на VPS актуальный server.js с поддержкой десктоп-OAuth.';
                } else if (oErr.indexOf('complete_') === 0) {
                  deskMsg =
                    'Не удалось подтвердить вход в приложении (POST /api/auth/desktop-oauth-complete). Обновите сервер TalkPilot и повторите.';
                } else if (oErr === 'complete_no_user_id') {
                  deskMsg = 'Сервер не вернул данные пользователя. Обновите backend и повторите вход.';
                } else if (oErr === 'loopback_bind_failed') {
                  deskMsg = 'Не удалось открыть локальный порт для возврата из Google. Перезапустите ПК или закройте лишние приложения.';
                } else if (oErr === 'oauth_window_closed') {
                  deskMsg = 'Окно входа закрыто до завершения. Попробуйте снова.';
                } else if (oErr === 'no_window') {
                  deskMsg = 'Окно приложения недоступно. Перезапустите десктоп.';
                } else if (
                  /failed to fetch|networkerror|net::err|load failed/i.test(oErr) ||
                  oErr.indexOf('fetch') >= 0
                ) {
                  deskMsg =
                    'Нет связи с сервером. В .env укажите VOICE_TRANSLATOR_CHAT_URL=https://talkpilot.pro/ui (см. docs/GOOGLE_OAUTH.md) и проверьте интернет.';
                } else if (oErr) {
                  deskMsg = 'Не удалось завершить вход через Google (' + oErr + ')';
                } else {
                  deskMsg = 'Не удалось завершить вход через Google';
                }
                msg.textContent = deskMsg;
                msg.className = 'is-error';
                googleBtn.disabled = false;
                return;
              }

              var gResp = await apiFetch(
                '/api/auth/google?redirect=' + encodeURIComponent(redirectTarget)
              );
              var gData = await gResp.json().catch(function () { return {}; });
              if (!gResp.ok) {
                var gDet = gData && gData.detail;
                var errText = 'Вход через Google недоступен';
                if (gResp.status === 404) {
                  errText =
                    'На сервере нет маршрута Google-входа. Перезапустите backend: python backend/web_server.py';
                } else if (gResp.status === 503) {
                  errText =
                    gDet != null
                      ? String(gDet)
                      : 'Добавьте GOOGLE_CLIENT_ID и GOOGLE_CLIENT_SECRET в .env и перезапустите сервер';
                } else if (gDet != null) {
                  errText = String(gDet);
                }
                msg.textContent = errText;
                msg.className = 'is-error';
                googleBtn.disabled = false;
                return;
              }
              if (gData && gData.url) {
                if (isLoginDesktopShell()) {
                  msg.textContent =
                    'Перезапустите десктоп-приложение (npm start в папке desktop) и повторите вход.';
                  msg.className = 'is-error';
                  googleBtn.disabled = false;
                  return;
                }
                window.location.href = gData.url;
                return;
              }
              msg.textContent = 'Не удалось открыть страницу Google';
              msg.className = 'is-error';
            } catch (gErr) {
              msg.textContent = siteT('login.err.network');
              msg.className = 'is-error';
            }
            googleBtn.disabled = false;
          });
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          var email = (document.getElementById('loginEmail').value || '').trim();
          var password = document.getElementById('loginPassword').value || '';
          msg.className = '';
          msg.style.display = 'none';
          msg.textContent = '';

          if (!email || !password) {
            msg.textContent = siteT('login.err.email_password');
            msg.className = 'is-error';
            return;
          }

          submitBtn.disabled = true;
          try {
            var data;
            var ok = false;
            if (
              isFileLoginPage() &&
              typeof window.voiceflowDesktop !== 'undefined' &&
              window.voiceflowDesktop &&
              typeof window.voiceflowDesktop.authLogin === 'function'
            ) {
              var out = await window.voiceflowDesktop.authLogin({ email: email, password: password });
              data = out && out.body != null ? out.body : {};
              ok = Boolean(out && out.ok);
              if (!ok && out && out.error && !data.detail) {
                data = { detail: String(out.error) };
              }
            } else {
              var resp = await apiFetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email: email, password: password })
              });
              data = await resp.json().catch(function () { return {}; });
              ok = resp.ok;
            }
            if (!ok) {
              var d = data && data.detail;
              var errText = siteT('login.err.login_failed');
              if (d != null) {
                errText = Array.isArray(d) ? d.map(function (x) { return typeof x === 'string' ? x : (x.msg || JSON.stringify(x)); }).join(' ') : String(d);
              } else if (data && data.error) errText = String(data.error);
              msg.textContent = errText;
              msg.className = 'is-error';
              submitBtn.disabled = false;
              return;
            }
            msg.textContent = siteT('login.ok.login_redirect');
            msg.className = 'is-ok';
            if (
              typeof window.voiceflowDesktop !== 'undefined' &&
              window.voiceflowDesktop &&
              typeof window.voiceflowDesktop.navigateAfterLogin === 'function'
            ) {
              try {
                await window.voiceflowDesktop.navigateAfterLogin(redirectTarget || '/ui');
                return;
              } catch (navErr) {
                console.warn('navigateAfterLogin', navErr);
              }
            }
            if (
              isFileLoginPage() &&
              typeof window.voiceflowDesktop !== 'undefined' &&
              window.voiceflowDesktop &&
              typeof window.voiceflowDesktop.getChatOrigin === 'function' &&
              !apiOrigin
            ) {
              try {
                apiOrigin = String(await window.voiceflowDesktop.getChatOrigin() || '')
                  .trim()
                  .replace(/\/$/, '');
              } catch (_) { /* ignore */ }
            }
            window.location.href = absUrl(redirectTarget || '/ui');
            return;
          } catch (err) {
            msg.textContent = siteT('login.err.network');
            msg.className = 'is-error';
            submitBtn.disabled = false;
          }
        });

        if (registerForm && registerSubmitBtn) {
          registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            var name = (document.getElementById('registerName').value || '').trim();
            var email = (document.getElementById('registerEmail').value || '').trim();
            var password = document.getElementById('registerPassword').value || '';
            msg.className = '';
            msg.style.display = 'none';
            msg.textContent = '';

            if (!name || !email || !password) {
              msg.textContent = siteT('login.err.fill_all');
              msg.className = 'is-error';
              return;
            }
            if (password.length < 6) {
              msg.textContent = siteT('login.err.password_min');
              msg.className = 'is-error';
              return;
            }

            var captchaEl = document.getElementById('registerCaptcha');
            var captchaPayload = null;
            if (captchaEl && window.vfCaptcha) {
              try {
                var captchaEnabled = await window.vfCaptcha.isEnabled();
                if (captchaEnabled) {
                  captchaPayload = window.vfCaptcha.getPayload(captchaEl);
                  if (!captchaPayload || !captchaPayload.captchaAnswer) {
                    msg.textContent = siteT('login.err.captcha_required');
                    msg.className = 'is-error';
                    return;
                  }
                }
              } catch (captchaCfgErr) { /* ignore */ }
            }

            registerSubmitBtn.disabled = true;
            try {
              var regBody = { name: name, email: email, password: password };
              if (captchaPayload) {
                regBody.captchaId = captchaPayload.captchaId;
                regBody.captchaAnswer = captchaPayload.captchaAnswer;
              }
              var regResp = await apiFetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(regBody),
              });
              var regData = await regResp.json().catch(function () { return {}; });
              if (!regResp.ok) {
                var rd = regData && (regData.error || regData.detail);
                msg.textContent =
                  rd != null
                    ? Array.isArray(rd)
                      ? rd.map(function (x) {
                          return typeof x === 'string' ? x : x.msg || JSON.stringify(x);
                        }).join(' ')
                      : String(rd)
                    : siteT('login.err.register_failed');
                msg.className = 'is-error';
                if (captchaEl && window.vfCaptcha) window.vfCaptcha.reset(captchaEl);
                registerSubmitBtn.disabled = false;
                return;
              }

              var loginResp = await apiFetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email: email, password: password }),
              });
              if (!loginResp.ok) {
                msg.textContent = siteT('login.ok.register_login_manual');
                msg.className = 'is-ok';
                setLoginMode('login');
                document.getElementById('loginEmail').value = email;
                registerSubmitBtn.disabled = false;
                return;
              }

              msg.textContent = siteT('login.ok.register_redirect');
              msg.className = 'is-ok';
              window.location.href = absUrl(redirectTarget);
            } catch (regErr) {
              msg.textContent = siteT('login.err.network');
              msg.className = 'is-error';
              if (captchaEl && window.vfCaptcha) window.vfCaptcha.reset(captchaEl);
              registerSubmitBtn.disabled = false;
            }
          });
        }

        initLoginDesktopWindowControls();
      }

      function bootLoginPage() {
        if (window.siteLangReady && typeof window.siteLangReady.then === 'function') {
          window.siteLangReady.then(function () { void init(); });
        } else {
          void init();
        }
      }

      bootLoginPage();
    })();
    </script>
</body>
</html>
